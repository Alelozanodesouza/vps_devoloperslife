<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comandos VPS — Referência Completa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --card: #ffffff;
      --border: #e2e0d8;
      --border-hover: #c8c6be;
      --text: #1a1a18;
      --muted: #6b6a64;
      --accent: #1a6b45;
      --accent-light: #e6f4ee;
      --mono: 'Courier New', Courier, monospace;
      --sans: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    header { margin-bottom: 2rem; }
    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    header p { color: var(--muted); font-size: 0.9rem; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--sans);
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }

    .filtros { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .pill {
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      transition: all .15s;
      user-select: none;
    }
    .pill:hover { border-color: var(--border-hover); color: var(--text); }
    .pill.ativo { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

    .contagem {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .tabela-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    td {
      padding: 10px 14px;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      line-height: 1.5;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fbfaf7; }

    code {
      font-family: var(--mono);
      font-size: 12px;
      background: #f0ede6;
      color: #1a1a18;
      padding: 2px 7px;
      border-radius: 4px;
      word-break: break-all;
      display: inline-block;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .cat-nav      { background: #e1f5ee; color: #0a5e44; }
    .cat-arquivo  { background: #e6f1fb; color: #154f8c; }
    .cat-sistema  { background: #faeeda; color: #7a4a09; }
    .cat-docker   { background: #eeedfe; color: #4a3dab; }
    .cat-rede     { background: #faece7; color: #8c3218; }
    .cat-firewall { background: #fcebeb; color: #962828; }
    .cat-banco    { background: #eaf3de; color: #2e5e10; }

    .analogia { color: var(--muted); font-size: 13px; }

    .vazio {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      th:nth-child(4), td:nth-child(4) { display: none; }
      th:nth-child(2), td:nth-child(2) { display: none; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Comandos VPS — Referência Completa</h1>
    <p>Guia de comandos Linux para iniciantes. Use a busca ou os filtros por categoria.</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="busca" placeholder="Buscar comando ou descrição..." oninput="filtrar()">
    </div>
    <div class="filtros">
      <span class="pill ativo" onclick="setCateg('todos',this)">Todos</span>
      <span class="pill" onclick="setCateg('nav',this)">Navegação</span>
      <span class="pill" onclick="setCateg('arquivo',this)">Arquivos</span>
      <span class="pill" onclick="setCateg('sistema',this)">Sistema</span>
      <span class="pill" onclick="setCateg('docker',this)">Docker</span>
      <span class="pill" onclick="setCateg('rede',this)">Rede</span>
      <span class="pill" onclick="setCateg('firewall',this)">Firewall</span>
      <span class="pill" onclick="setCateg('banco',this)">Banco de dados</span>
    </div>
  </div>

  <p class="contagem" id="contagem"></p>

  <div class="tabela-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:26%">Comando</th>
          <th style="width:11%">Categoria</th>
          <th style="width:36%">O que faz</th>
          <th style="width:27%">Analogia para leigos</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
    <div class="vazio" id="vazio" style="display:none">Nenhum comando encontrado.</div>
  </div>

</div>

<script>
const dados = [
  {cmd:"pwd", cat:"nav", desc:"Mostra em qual pasta você está no momento", leigo:"Como olhar o endereço da rua onde você está"},
  {cmd:"ls", cat:"nav", desc:"Lista os arquivos e pastas dentro da pasta atual", leigo:"Abrir uma pasta no Explorador de Arquivos e ver o conteúdo"},
  {cmd:"ls -lh", cat:"nav", desc:"Lista arquivos com detalhes: tamanho, data e permissões", leigo:"Ver os arquivos no modo 'detalhes' do Windows"},
  {cmd:"cd /caminho", cat:"nav", desc:"Entra em uma pasta específica", leigo:"Dar duplo clique em uma pasta para abrí-la"},
  {cmd:"cd ..", cat:"nav", desc:"Volta para a pasta anterior (sobe um nível)", leigo:"Clicar na seta 'voltar' no Explorador de Arquivos"},
  {cmd:"find . -type f", cat:"nav", desc:"Lista todos os arquivos dentro da pasta atual e subpastas", leigo:"Usar a busca do Windows para encontrar todos os arquivos de uma pasta"},
  {cmd:"mkdir -p /pasta", cat:"arquivo", desc:"Cria uma nova pasta (e as pastas do caminho se não existirem)", leigo:"Criar uma nova pasta, igual ao botão direito > Nova pasta no Windows"},
  {cmd:"cat arquivo.txt", cat:"arquivo", desc:"Exibe o conteúdo de um arquivo na tela", leigo:"Abrir um arquivo de texto para lê-lo, sem poder editar"},
  {cmd:"cat > arquivo << 'EOF'", cat:"arquivo", desc:"Cria um arquivo e escreve conteúdo dentro dele", leigo:"Criar um novo documento e digitar o texto nele"},
  {cmd:"nano arquivo.txt", cat:"arquivo", desc:"Abre um editor de texto simples para editar o arquivo", leigo:"Abrir um arquivo no Bloco de Notas para editar"},
  {cmd:"rm arquivo.txt", cat:"arquivo", desc:"Apaga um arquivo permanentemente", leigo:"Deletar um arquivo — sem lixeira, sem desfazer"},
  {cmd:"rm -rf /pasta", cat:"arquivo", desc:"Apaga uma pasta e tudo dentro dela, sem pedir confirmação", leigo:"Shift+Delete em uma pasta inteira no Windows"},
  {cmd:"cp origem destino", cat:"arquivo", desc:"Copia um arquivo de um lugar para outro", leigo:"Copiar e colar um arquivo no Windows"},
  {cmd:"mv origem destino", cat:"arquivo", desc:"Move ou renomeia um arquivo", leigo:"Recortar e colar, ou renomear um arquivo no Windows"},
  {cmd:"sed -i 's/antigo/novo/' arq", cat:"arquivo", desc:"Encontra e substitui um texto dentro de um arquivo", leigo:"Usar Ctrl+H (localizar e substituir) no Word"},
  {cmd:"grep -i 'palavra' arquivo", cat:"arquivo", desc:"Busca linhas que contêm uma palavra específica", leigo:"Usar Ctrl+F para buscar uma palavra dentro de um documento"},
  {cmd:"apt update", cat:"sistema", desc:"Busca a lista de atualizações disponíveis para o sistema", leigo:"Verificar se há atualizações no Windows Update"},
  {cmd:"apt upgrade -y", cat:"sistema", desc:"Instala todas as atualizações disponíveis", leigo:"Instalar as atualizações do Windows Update sem confirmar cada uma"},
  {cmd:"apt install programa -y", cat:"sistema", desc:"Instala um programa no servidor", leigo:"Baixar e instalar um aplicativo pela loja de apps"},
  {cmd:"reboot", cat:"sistema", desc:"Reinicia o servidor", leigo:"Clicar em Iniciar > Reiniciar no Windows"},
  {cmd:"lsb_release -a", cat:"sistema", desc:"Mostra a versão do sistema operacional instalado", leigo:"Ver nas configurações qual versão do Windows você tem"},
  {cmd:"sleep 30", cat:"sistema", desc:"Pausa a execução por 30 segundos antes de continuar", leigo:"Aguardar um temporizador antes de fazer a próxima ação"},
  {cmd:"chown -R 1000 /pasta", cat:"sistema", desc:"Muda o dono de uma pasta para outro usuário", leigo:"Transferir a propriedade de um arquivo para outra pessoa"},
  {cmd:"&& (e depois)", cat:"sistema", desc:"Executa o próximo comando só se o anterior funcionou", leigo:"Só continue para o próximo passo se o atual der certo"},
  {cmd:"| (pipe)", cat:"sistema", desc:"Passa o resultado de um comando como entrada para outro", leigo:"Uma esteira onde a saída de uma máquina alimenta a próxima"},
  {cmd:"docker-compose up -d", cat:"docker", desc:"Inicia todos os contêineres definidos no arquivo de configuração", leigo:"Ligar todos os programas do servidor de uma vez"},
  {cmd:"docker-compose down", cat:"docker", desc:"Para e remove todos os contêineres em execução", leigo:"Desligar todos os programas do servidor de uma vez"},
  {cmd:"docker-compose ps", cat:"docker", desc:"Lista os contêineres e mostra se estão ligados ou desligados", leigo:"Ver no Gerenciador de Tarefas quais programas estão rodando"},
  {cmd:"docker-compose restart nome", cat:"docker", desc:"Reinicia um contêiner específico sem afetar os outros", leigo:"Fechar e reabrir somente um programa específico"},
  {cmd:"docker-compose up -d --build", cat:"docker", desc:"Inicia os contêineres e reconstrói as imagens antes", leigo:"Reinstalar um programa e depois abri-lo"},
  {cmd:"docker logs nome --tail 30", cat:"docker", desc:"Mostra as últimas 30 linhas do histórico de atividades", leigo:"Ver as últimas entradas do diário de atividades de um programa"},
  {cmd:"docker logs nome -f", cat:"docker", desc:"Mostra os logs em tempo real, atualizando conforme eventos acontecem", leigo:"Assistir ao diário de atividades ao vivo, como uma transmissão"},
  {cmd:"docker exec nome comando", cat:"docker", desc:"Executa um comando dentro de um contêiner em execução", leigo:"Abrir o terminal dentro de um programa que já está rodando"},
  {cmd:"docker --version", cat:"docker", desc:"Mostra a versão do Docker instalada", leigo:"Verificar qual versão de um programa está instalada"},
  {cmd:"curl http://endereço", cat:"rede", desc:"Faz uma requisição para um endereço e mostra a resposta", leigo:"Acessar um site e ver o que ele responde, sem abrir o navegador"},
  {cmd:"curl -X POST -d dados url", cat:"rede", desc:"Envia dados para um endereço (como preencher e enviar um formulário)", leigo:"Preencher um formulário online e clicar em Enviar"},
  {cmd:"curl -H 'chave: valor' url", cat:"rede", desc:"Adiciona um cabeçalho à requisição (como uma credencial de acesso)", leigo:"Apresentar um cartão de identificação antes de entrar em algum lugar"},
  {cmd:"curl -I https://site.com", cat:"rede", desc:"Verifica se um endereço está acessível sem baixar o conteúdo", leigo:"Bater na porta para ver se alguém atende, sem entrar"},
  {cmd:"ufw allow 22", cat:"firewall", desc:"Libera a porta 22 no firewall (acesso SSH ao servidor)", leigo:"Abrir a porta de entrada do servidor para você entrar pelo terminal"},
  {cmd:"ufw allow 8080", cat:"firewall", desc:"Libera a porta 8080 para acesso externo", leigo:"Abrir uma janela específica do servidor para o mundo acessar"},
  {cmd:"ufw --force enable", cat:"firewall", desc:"Ativa o firewall sem pedir confirmação", leigo:"Ligar o sistema de segurança do servidor"},
  {cmd:"ufw status", cat:"firewall", desc:"Mostra quais portas estão abertas ou fechadas no firewall", leigo:"Ver o painel de controle das portas abertas no servidor"},
  {cmd:"psql -U user -d banco -c 'SQL'", cat:"banco", desc:"Executa um comando SQL diretamente no banco de dados PostgreSQL", leigo:"Abrir o banco de dados e fazer uma consulta ou modificação"},
  {cmd:"SELECT * FROM Tabela;", cat:"banco", desc:"Busca e exibe todos os registros de uma tabela no banco de dados", leigo:"Abrir uma planilha e ver todas as linhas de uma vez"},
  {cmd:"DELETE FROM Tabela WHERE ...", cat:"banco", desc:"Remove registros específicos do banco de dados", leigo:"Apagar linhas específicas de uma planilha pelo conteúdo da célula"},
];

const nomes = {nav:"Navegação", arquivo:"Arquivos", sistema:"Sistema", docker:"Docker", rede:"Rede", firewall:"Firewall", banco:"Banco de dados"};
let categAtiva = "todos";

function badge(cat) {
  return `<span class="badge cat-${cat}">${nomes[cat] || cat}</span>`;
}

function filtrar() {
  const q = document.getElementById("busca").value.toLowerCase();
  const rows = dados.filter(d => {
    const passaCat = categAtiva === "todos" || d.cat === categAtiva;
    const passaBusca = !q || d.cmd.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q) || d.leigo.toLowerCase().includes(q);
    return passaCat && passaBusca;
  });

  const tb = document.getElementById("tabela");
  const vazio = document.getElementById("vazio");
  const cont = document.getElementById("contagem");

  cont.textContent = `${rows.length} comando${rows.length !== 1 ? "s" : ""} encontrado${rows.length !== 1 ? "s" : ""}`;

  if (rows.length === 0) {
    tb.innerHTML = "";
    vazio.style.display = "block";
  } else {
    vazio.style.display = "none";
    tb.innerHTML = rows.map(d => `
      <tr>
        <td><code>${d.cmd}</code></td>
        <td>${badge(d.cat)}</td>
        <td>${d.desc}</td>
        <td class="analogia">${d.leigo}</td>
      </tr>
    `).join("");
  }
}

function setCateg(c, el) {
  categAtiva = c;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("ativo"));
  el.classList.add("ativo");
  filtrar();
}

filtrar();
</script>
</body>
</html>
